{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- HERO / PAGE HEADER -->
<section class="hero-section text-white py-5" style="background: linear-gradient(135deg, #800000, #0f0f0f);">
    <div class="container text-center">
        <h1 class="fw-bold display-5">
            <span style="color:#f6c000;">Contact Us</span>
        </h1>
        <p class="lead mt-3">
            Have questions or need assistance? Reach out to Randini Auto Garage today!
        </p>
    </div>
</section>

<!-- QUICK CONTACT INFO -->
<!-- QUICK CONTACT INFO -->
<section class="py-4 bg-light">
    <div class="container">
        <div class="row text-center g-4">
            <!-- Phone Card -->
            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <i class="bi bi-telephone-fill fs-2 text-warning mb-2"></i>
                    <h5 class="fw-bold">Phone</h5>
                    <p class="mb-0">
                        <a href="tel:0711962088" class="text-decoration-none text-dark">
                            0711962088
                        </a>
                    </p>
                </div>
            </div>

            <!-- Email Card -->
            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <i class="bi bi-envelope-fill fs-2 text-warning mb-2"></i>
                    <h5 class="fw-bold">Email</h5>
                    <p class="mb-0">
                        <a href="mailto:randinigarage@gmail.com" class="text-decoration-none text-dark">
                            randinigarage@gmail.com
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>


<!-- CONTACT FORM & MAP -->
<section class="py-5">
    <div class="container">

        <div class="row g-4">
            <!-- FORM -->
            <div class="col-lg-6">
                <div class="card shadow p-4">
                    <h3 class="fw-bold mb-3">Get in Touch</h3>
                    <form method="POST" action="">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="john@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label fw-bold">Phone Number</label>
                            <input type="text" class="form-control" id="phone" name="phone" placeholder="+2547XXXXXXXX" required>
                        </div>

                        <div class="mb-3">
                            <label for="subject" class="form-label fw-bold">Subject</label>
                            <input type="text" class="form-control" id="subject" name="subject" placeholder="Your inquiry subject" required>
                        </div>

                        <div class="mb-3">
                            <label for="message" class="form-label fw-bold">Message</label>
                            <textarea class="form-control" id="message" name="message" rows="4" placeholder="Write your message here..." required></textarea>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-warning btn-lg fw-bold">
                                Send Message
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- MAP -->
            <div class="col-lg-6">
                <div class="card shadow p-0">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.234087!2d34.567890!3d0.567890!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1785e12abc12345%3A0xabcdef1234567890!2sBungoma%20County!5e0!3m2!1sen!2ske!4v1678901234567!5m2!1sen!2ske"
                        width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                    ></iframe>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
