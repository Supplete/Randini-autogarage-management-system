{% extends 'staff/admin_base.html' %}
{% block content %}
<h2>Edit Spare Part: {{ part.name }}</h2>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    {% if part.image %}
        <p>Current Image:</p>
        <img src="{{ part.image.url }}" width="120" alt="{{ part.name }}">
    {% endif %}
    <button type="submit" class="btn btn-primary">Save Changes</button>
</form>
{% endblock %}
