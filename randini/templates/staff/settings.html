{% extends 'staff/admin_base.html' %}
{% block title %}Settings | Admin{% endblock %}

{% block content %}

<div class="container py-4">
    <h2 class="fw-bold mb-4">Site Settings</h2>

    <div class="card shadow-sm p-4">
        <form>
            <!-- Company Info -->
            <h5 class="mb-3">Company Information</h5>
            <div class="mb-3">
                <label for="companyName" class="form-label">Company Name</label>
                <input type="text" class="form-control" id="companyName" value="Randini Auto Garage">
            </div>
            <div class="mb-3">
                <label for="companyEmail" class="form-label">Email</label>
                <input type="email" class="form-control" id="companyEmail" value="randinigarage@gmail.com">
            </div>
            <div class="mb-3">
                <label for="companyPhone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="companyPhone" value="+254711962088">
            </div>
            <div class="mb-3">
                <label for="companyAddress" class="form-label">Address</label>
                <input type="text" class="form-control" id="companyAddress" value="Bungoma County, Kenya">
            </div>

            <hr>

            <!-- Branding -->
            <h5 class="mb-3">Branding</h5>
            <div class="mb-3">
                <label for="primaryColor" class="form-label">Primary Color</label>
                <input type="color" class="form-control form-control-color" id="primaryColor" value="#800000" title="Choose your primary color">
            </div>
            <div class="mb-3">
                <label for="secondaryColor" class="form-label">Secondary Color</label>
                <input type="color" class="form-control form-control-color" id="secondaryColor" value="#f6c000" title="Choose your secondary color">
            </div>

            <hr>

            <!-- Admin Options -->
            <h5 class="mb-3">Admin Options</h5>
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="enableNotifications" checked>
                <label class="form-check-label" for="enableNotifications">
                    Enable email notifications
                </label>
            </div>
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="maintenanceMode">
                <label class="form-check-label" for="maintenanceMode">
                    Enable maintenance mode
                </label>
            </div>

            <button type="submit" class="btn btn-warning mt-3 fw-bold">Save Settings</button>
        </form>
    </div>
</div>

{% endblock %}
