{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 500px; margin-top: 50px;">
    <h2>Set New Password</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Change Password</button>
    </form>
</div>
{% endblock %}
